  - name: Remove app directory
    ansible.builtin.file:
     path: /app
     state: absent
   # Create app directory
  - name: Create app directory
    ansible.builtin.file:
     path: /app
     state: directory
  # Delete existing downloaded code
  - name: Delete {{ component }} file
    ansible.builtin.file:
     path: /tmp/{{ component }}.zip
     state: absent
  # Download fresh code to temp directory
  - name: Download {{ component }} code
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
     dest: /tmp/{{ component }}.zip
  # unzip the code and move it to App directory.
  - name: Unzip code and move to app directory
    ansible.builtin.unarchive:
     src: /tmp/{{ component }}.zip
     dest: /app 
     remote_src: yes