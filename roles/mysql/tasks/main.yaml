    - name: Install mysql server
      ansible.builtin.dnf:
        name: mysql-server
        state: present
    
    - name: Start and enable mysql service
      ansible.builtin.service:
        name: mysqld
        state: started
        enabled: yes
        
# Install dependency libraries to communicate with AWS
    - name: Install dependency_libraries
      ansible.builtin.pip:
        name: 
         - boto3
         - botocore
        executable: pip3
        state: present

    - name: Set root password to mysql
      ansible.builtin.shell: mysql_secure_installation --set-root-pass "{{ mysql_root_password }}"